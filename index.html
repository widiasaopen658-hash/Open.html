<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunga Interaktif</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000; /* Background Hitam */
            margin: 0;
            overflow: hidden; /* Mencegah scroll saat banyak emoji muncul */
            font-family: Arial, sans-serif;
            cursor: pointer;
        }

        .flower {
            font-size: 150px;
            cursor: pointer;
            z-index: 10;
            user-select: none;
            animation: sway 3s ease-in-out infinite;
            transform-origin: bottom center;
            transition: transform 0.3s;
        }

        .flower:hover {
            transform: scale(1.2);
        }

        @keyframes sway {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        /* Gaya untuk emoji yang muncul saat diklik */
        .particle {
            position: absolute;
            pointer-events: none;
            font-size: 30px;
            animation: flyUp 2s ease-out forwards;
            z-index: 5;
        }

        @keyframes flyUp {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translate(var(--dx), var(--dy)) scale(0.5) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body onclick="createParticles(event)">

    <div class="flower">🌹</div>

    <script>
        function createParticles(e) {
            // Daftar emoji yang akan muncul
            const emojis = ['🌹', '❤️', '💖', '🥀', '✨'];
            
            // Jumlah emoji yang muncul setiap satu kali klik
            const count = 10; 

            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
                
                // Atur posisi awal di titik kursor
                particle.style.left = e.clientX + 'px';
                particle.style.top = e.clientY + 'px';

                // Tentukan arah terbang acak menggunakan CSS Variables
                const dx = (Math.random() - 0.5) * 400 + 'px';
                const dy = (Math.random() - 0.5) * 400 + 'px';
                particle.style.setProperty('--dx', dx);
                particle.style.setProperty('--dy', dy);

                document.body.appendChild(particle);

                // Hapus elemen setelah animasi selesai agar tidak memberatkan browser
                setTimeout(() => {
                    particle.remove();
                }, 2000);
            }
        }
    </script>
</body>
</html>
